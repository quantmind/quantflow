include = [ "pyproject.toml", "taplo.toml" ]

[formatting]
allowed_blank_lines = 1
array_auto_collapse = false
array_auto_expand = true
compact_arrays = false
indent_string = "    "
trailing_newline = true

[[rule]]
formatting = { reorder_arrays = true, reorder_keys = true }
include = [ "pyproject.toml" ]
keys = [
    "project.optional-dependencies",
    "project.optional-dependencies.ai",
    "project.optional-dependencies.book",
    "project.optional-dependencies.data",
    "project.optional-dependencies.dev",
    "project.optional-dependencies.docs",
    "project.optional-dependencies.ml",
]
